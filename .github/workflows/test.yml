name: Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: uv sync

    - name: Start Redis for rate limiting tests
      run: |
        docker run -d -p 6379:6379 --name redis redis:alpine
        sleep 2
        docker ps

    - name: Run tests
      env:
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_DB: 0
      run: uv run pytest -v

    - name: Lint with Ruff (optional)
      run: |
        uv run pip install ruff
        uv run ruff check . || true

    - name: Stop Redis
      if: always()
      run: docker stop redis || true
